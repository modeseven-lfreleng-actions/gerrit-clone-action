---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Action test/validation workflow
name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  ### Test the GitHub Action with O-RAN Gerrit ###
  tests:
    name: "Test Gerrit Clone"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30 # Increase this timeout value as needed
    steps:
      - name: "Check for pull request context"
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Secrets not available on pull request; skipping tests ❌"
            echo "Secrets not available on pull request; skipping tests ❌" \
          else
            echo "Running in trusted context (${{ github.event_name }}) ✅"
          fi

      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: 'audit'

      - name: "Checkout repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Set up Python"
        # yamllint disable-line rule:line-length
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: "Install gerrit-clone CLI"
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: "Test GitHub Action: gerrit.o-ran-sc.org [SSH]"
        uses: ./
        with:
          host: "gerrit.o-ran-sc.org"
          ssh-user: "${{ vars.GERRIT_SSH_USER }}"
          ssh-private-key: "${{ secrets.GERRIT_SSH_PRIVATE_KEY }}"
          output-path: "gerrit.o-ran-sc.org-action"
          depth: "1"
          strict-host: "false"

      - name: "Validate GitHub Action Results [SSH]"
        shell: bash
        run: |
          # Validate GitHub Action Results
          if [ -d "gerrit.o-ran-sc.org-action" ]; then
            SIZE=$(du -sh gerrit.o-ran-sc.org-action | awk '{print $1}')
            {
              echo "🧪 **O-RAN-SC GitHub Action Clone Results:**"
              echo "- Size: $SIZE"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Test failed: gerrit.o-ran-sc.org-action/ not found"
            {
              echo "❌ Test failed: gerrit.o-ran-sc.org-action/ not found"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: "Test CLI Tool: gerrit.o-ran-sc.org [SSH]"
        shell: bash
        run: |
          # Set up SSH agent with private key (never touches disk)
          SSH_AUTH_SOCK="/tmp/ssh_agent_cli_${{ github.run_id }}.sock"

          # Start SSH agent
          ssh-agent -a "$SSH_AUTH_SOCK" > /dev/null

          # Add private key to SSH agent
          echo "${{ secrets.GERRIT_SSH_PRIVATE_KEY }}" | \
            SSH_AUTH_SOCK="$SSH_AUTH_SOCK" ssh-add -

          # Run CLI tool with SSH agent
          SSH_AUTH_SOCK="$SSH_AUTH_SOCK" gerrit-clone clone \
            --host "gerrit.o-ran-sc.org" \
            --ssh-user "${{ vars.GERRIT_SSH_USER }}" \
            --output-path "gerrit.o-ran-sc.org-cli" \
            --threads "2" \
            --depth "1" \
            --ssh \
            --accept-unknown-host \
            --skip-archived

          # Clean up SSH agent
          SSH_AUTH_SOCK="$SSH_AUTH_SOCK" ssh-agent -k > /dev/null 2>&1 || true

      - name: "Validate CLI Tool Results [SSH]"
        shell: bash
        run: |
          # Validate CLI Tool Results
          if [ -d "gerrit.o-ran-sc.org-cli" ]; then
            SIZE=$(du -sh gerrit.o-ran-sc.org-action | awk '{print $1}')
            {
              echo "🧪 **O-RAN-SC CLI Test Clone Results:**"
              echo "- Size: $SIZE"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Test failed: gerrit.o-ran-sc.org-cli/ not found"
            {
              echo "❌ Test failed: gerrit.o-ran-sc.org-cli/ not found"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: "Test GitHub Action: gerrit.o-ran-sc.org [HTTPS]"
        uses: ./
        with:
          host: "gerrit.o-ran-sc.org"
          output-path: "gerrit.o-ran-sc.org-action-https"
          depth: "1"
          use-https: "true"

      - name: "Validate GitHub Action Results [HTTPS]"
        shell: bash
        run: |
          # Validate GitHub Action HTTPS Results
          if [ -d "gerrit.o-ran-sc.org-action-https" ]; then
            SIZE=$(du -sh gerrit.o-ran-sc.org-action-https | awk '{print $1}')
            {
              echo "🧪 **O-RAN-SC GitHub Action HTTPS Clone Results:**"
              echo "- Size: $SIZE"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Test failed: gerrit.o-ran-sc.org-action-https/ not found"
            {
              echo "❌ Test failed: gerrit.o-ran-sc.org-action-https/ not found"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: "Test CLI Tool: gerrit.o-ran-sc.org [HTTPS]"
        shell: bash
        run: |
          gerrit-clone clone \
            --host "gerrit.o-ran-sc.org" \
            --output-path "gerrit.o-ran-sc.org-cli-https" \
            --threads "2" \
            --depth "1" \
            --https \
            --skip-archived

      - name: "Validate CLI Tool Results [HTTPS]"
        shell: bash
        run: |
          # Validate CLI Tool HTTPS Results
          if [ -d "gerrit.o-ran-sc.org-cli-https" ]; then
            SIZE=$(du -sh gerrit.o-ran-sc.org-cli-https | awk '{print $1}')
            {
              echo "🧪 **O-RAN-SC CLI HTTPS Test Clone Results:**"
              echo "- Size: $SIZE"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Test failed: gerrit.o-ran-sc.org-cli-https/ not found"
            {
              echo "❌ Test failed: gerrit.o-ran-sc.org-cli-https/ not found"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  ### Integration tests: content filtering with real Gerrit repo ###
  content-filter-tests:
    name: "Test Content Filtering"
    needs: tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: "Check for pull request context"
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::warning::Secrets unavailable in PR context"
          fi

      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: 'audit'

      - name: "Checkout repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Set up Python"
        # yamllint disable-line rule:line-length
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: "Install gerrit-clone CLI and git-filter-repo"
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install git-filter-repo

      # ---------------------------------------------------------------
      # Test 1: Clone with --git-filter (explicit token replacement)
      # ---------------------------------------------------------------

      - name: "Test clone with --git-filter (explicit token)"
        shell: bash
        env:
          FILTER_TOKEN: ${{ secrets.ONAP_TEST_FILTER_TOKEN }}
        run: |
          if [ -z "$FILTER_TOKEN" ]; then
            echo "::warning::ONAP_TEST_FILTER_TOKEN not set; skip"
            exit 0
          fi

          SPEC="testsuite/pythonsdk-tests:${FILTER_TOKEN}"

          gerrit-clone clone \
            --host "gerrit.onap.org" \
            --output-path "onap-git-filter" \
            --threads "1" \
            --https \
            --include-projects "testsuite/pythonsdk-tests" \
            --git-filter "$SPEC"

      - name: "Validate --git-filter clone results"
        shell: bash
        env:
          FILTER_TOKEN: ${{ secrets.ONAP_TEST_FILTER_TOKEN }}
        run: |
          if [ -z "$FILTER_TOKEN" ]; then
            echo "::warning::Skipped (no secret)" ; exit 0
          fi

          REPO="onap-git-filter/testsuite/pythonsdk-tests.git"
          if [ ! -d "$REPO" ]; then
            echo "::error::Repo not found: $REPO" ; exit 1
          fi

          # Token must NOT appear in any history
          if git -C "$REPO" log --all -p \
            | grep -qF "$FILTER_TOKEN"; then
            echo "::error::Token still in history after filter"
            exit 1
          fi

          # REDACTED_ placeholder must be present
          if ! git -C "$REPO" log --all -p \
            | grep -q "REDACTED_"; then
            echo "::error::No REDACTED_ placeholder found"
            exit 1
          fi

          {
            echo "### ✅ --git-filter clone: token redacted"
            echo "- Repo: \`$REPO\`"
            SIZE=$(du -sh "$REPO" | awk '{print $1}')
            echo "- Size: $SIZE"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # Test 2: Clone with --redact-secrets (auto-detection)
      # ---------------------------------------------------------------

      - name: "Test clone with --redact-secrets (auto-detect)"
        shell: bash
        run: |
          gerrit-clone clone \
            --host "gerrit.onap.org" \
            --output-path "onap-redact-secrets" \
            --threads "1" \
            --https \
            --include-projects "testsuite/pythonsdk-tests" \
            --redact-secrets

      - name: "Validate --redact-secrets clone results"
        shell: bash
        env:
          FILTER_TOKEN: ${{ secrets.ONAP_TEST_FILTER_TOKEN }}
        run: |
          REPO="onap-redact-secrets/testsuite/pythonsdk-tests.git"
          if [ ! -d "$REPO" ]; then
            echo "::error::Repo not found: $REPO" ; exit 1
          fi

          # When we have the secret, verify it is NOT present
          if [ -n "$FILTER_TOKEN" ]; then
            if git -C "$REPO" log --all -p \
              | grep -qF "$FILTER_TOKEN"; then
              echo "::error::Token still present after redact"
              exit 1
            fi
          fi

          # REDACTED_ placeholder must be present
          if ! git -C "$REPO" log --all -p \
            | grep -q "REDACTED_"; then
            echo "::error::No REDACTED_ placeholder found"
            exit 1
          fi

          {
            echo "### ✅ --redact-secrets clone: secrets redacted"
            echo "- Repo: \`$REPO\`"
            SIZE=$(du -sh "$REPO" | awk '{print $1}')
            echo "- Size: $SIZE"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # Test 3: Clone WITHOUT filtering, then refresh with --git-filter
      # ---------------------------------------------------------------

      - name: "Clone without filtering (for refresh test)"
        shell: bash
        run: |
          gerrit-clone clone \
            --host "gerrit.onap.org" \
            --output-path "onap-refresh-test" \
            --threads "1" \
            --https \
            --include-projects "testsuite/pythonsdk-tests"

      - name: "Verify token exists before refresh"
        shell: bash
        env:
          FILTER_TOKEN: ${{ secrets.ONAP_TEST_FILTER_TOKEN }}
        run: |
          if [ -z "$FILTER_TOKEN" ]; then
            echo "::warning::Skipped (no secret)" ; exit 0
          fi

          REPO="onap-refresh-test/testsuite/pythonsdk-tests.git"
          if [ ! -d "$REPO" ]; then
            echo "::error::Repo not found: $REPO" ; exit 1
          fi

          # Token MUST still be present (no filtering applied yet)
          if ! git -C "$REPO" log --all -p \
            | grep -qF "$FILTER_TOKEN"; then
            echo "::error::Token should exist before refresh"
            exit 1
          fi
          echo "✅ Token confirmed present before refresh"

      - name: "Refresh with --git-filter (explicit token)"
        shell: bash
        env:
          FILTER_TOKEN: ${{ secrets.ONAP_TEST_FILTER_TOKEN }}
        run: |
          if [ -z "$FILTER_TOKEN" ]; then
            echo "::warning::Skipped (no secret)" ; exit 0
          fi

          SPEC="testsuite/pythonsdk-tests:${FILTER_TOKEN}"

          gerrit-clone refresh \
            --output-path "onap-refresh-test" \
            --threads "1" \
            --git-filter "$SPEC"

      - name: "Validate refresh --git-filter results"
        shell: bash
        env:
          FILTER_TOKEN: ${{ secrets.ONAP_TEST_FILTER_TOKEN }}
        run: |
          if [ -z "$FILTER_TOKEN" ]; then
            echo "::warning::Skipped (no secret)" ; exit 0
          fi

          REPO="onap-refresh-test/testsuite/pythonsdk-tests.git"

          # Token must NOT appear after refresh
          if git -C "$REPO" log --all -p \
            | grep -qF "$FILTER_TOKEN"; then
            echo "::error::Token still present after refresh"
            exit 1
          fi

          # REDACTED_ placeholder must be present
          if ! git -C "$REPO" log --all -p \
            | grep -q "REDACTED_"; then
            echo "::error::No REDACTED_ placeholder found"
            exit 1
          fi

          {
            echo "### ✅ refresh --git-filter: token redacted"
            echo "- Repo: \`$REPO\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # Test 4: Clone WITHOUT filtering, then refresh --redact-secrets
      # ---------------------------------------------------------------

      - name: "Clone without filtering (for redact refresh test)"
        shell: bash
        run: |
          gerrit-clone clone \
            --host "gerrit.onap.org" \
            --output-path "onap-refresh-redact" \
            --threads "1" \
            --https \
            --include-projects "testsuite/pythonsdk-tests"

      - name: "Refresh with --redact-secrets (auto-detect)"
        shell: bash
        run: |
          gerrit-clone refresh \
            --output-path "onap-refresh-redact" \
            --threads "1" \
            --redact-secrets

      - name: "Validate refresh --redact-secrets results"
        shell: bash
        env:
          FILTER_TOKEN: ${{ secrets.ONAP_TEST_FILTER_TOKEN }}
        run: |
          REPO="onap-refresh-redact/testsuite/pythonsdk-tests.git"
          if [ ! -d "$REPO" ]; then
            echo "::error::Repo not found: $REPO" ; exit 1
          fi

          if [ -n "$FILTER_TOKEN" ]; then
            if git -C "$REPO" log --all -p \
              | grep -qF "$FILTER_TOKEN"; then
              echo "::error::Token present after redact refresh"
              exit 1
            fi
          fi

          if ! git -C "$REPO" log --all -p \
            | grep -q "REDACTED_"; then
            echo "::error::No REDACTED_ placeholder found"
            exit 1
          fi

          {
            echo "### ✅ refresh --redact-secrets: auto-redacted"
            echo "- Repo: \`$REPO\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # Summary
      # ---------------------------------------------------------------

      - name: "Content filter test summary"
        if: always()
        shell: bash
        run: |
          {
            echo "---"
            echo "### Content Filter Integration Tests"
            echo "All 4 test scenarios completed."
          } >> "$GITHUB_STEP_SUMMARY"
